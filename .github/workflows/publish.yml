name: Publish

on:
  push:
    branches:
      - master
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/')
          git show HEAD~1:Cargo.toml > /tmp/old.toml 2>/dev/null || echo 'version = "0.0.0"' > /tmp/old.toml
          OLD=$(grep -m1 '^version' /tmp/old.toml | sed 's/version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/')
          echo "version=$VERSION"
          [ "$VERSION" != "$OLD" ] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

  tests:
    name: Tests
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/tests.yml

  docs:
    name: Docs
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, tests, docs]
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get crates.io token via Trusted Publishing
        id: token
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" | jq -re '.value')
          CRATES_TOKEN=$(curl -fsSL -X POST \
            https://crates.io/api/v1/trusted_publishing/tokens \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"$OIDC_TOKEN\"}" | jq -re '.token')
          echo "::add-mask::$CRATES_TOKEN"
          echo "token=$CRATES_TOKEN" >> $GITHUB_OUTPUT

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.token.outputs.token }}
        run: cargo publish
    environment: crates-publish
